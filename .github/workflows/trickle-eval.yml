# Reusable GitHub Action workflow for trickle eval
# Copy this file to your repo's .github/workflows/ directory
#
# Usage in your CI:
#   jobs:
#     eval:
#       uses: yiheinchai/trickle/.github/workflows/trickle-eval.yml@main
#       with:
#         command: "python my_agent.py"
#         fail-under: 70

name: Trickle Agent Eval

on:
  workflow_call:
    inputs:
      command:
        description: 'Command to run with trickle (e.g., "python my_agent.py", "node agent.js")'
        required: true
        type: string
      fail-under:
        description: 'Minimum eval score (0-100). Build fails if score is below this.'
        required: false
        type: number
        default: 0
      security-scan:
        description: 'Run security scan and fail on critical findings'
        required: false
        type: boolean
        default: false
      compliance-report:
        description: 'Generate and attach compliance audit report'
        required: false
        type: boolean
        default: false
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      python-version:
        description: 'Python version to use (for Python commands)'
        required: false
        type: string
        default: '3.11'

jobs:
  trickle-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Python
        if: contains(inputs.command, 'python')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install trickle
        run: |
          npm install -g trickle-cli
          if echo "${{ inputs.command }}" | grep -qi python; then
            pip install trickle-observe
          fi

      - name: Install project dependencies
        run: |
          if [ -f package.json ]; then npm install; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run with trickle
        run: trickle run ${{ inputs.command }}
        continue-on-error: true

      - name: Evaluate agent run
        id: eval
        run: |
          if [ "${{ inputs.fail-under }}" != "0" ]; then
            trickle eval --fail-under ${{ inputs.fail-under }} --json > eval-result.json
          else
            trickle eval --json > eval-result.json
          fi
          cat eval-result.json
        continue-on-error: true

      - name: Security scan
        if: inputs.security-scan
        id: security
        run: trickle security --json > security-result.json && cat security-result.json

      - name: Generate compliance report
        if: inputs.compliance-report
        run: trickle audit --compliance -o compliance-report.json

      - name: Post eval summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Trickle Agent Eval\n\n';

            try {
              const eval = JSON.parse(fs.readFileSync('eval-result.json', 'utf8'));
              const icon = eval.overallScore >= 80 ? '✅' : eval.overallScore >= 60 ? '⚠️' : '❌';
              body += `${icon} **Grade: ${eval.grade} (${eval.overallScore}/100)**\n\n`;
              body += '| Dimension | Score |\n|-----------|-------|\n';
              for (const [dim, data] of Object.entries(eval.dimensions || {})) {
                body += `| ${dim} | ${data.score}/100 |\n`;
              }
              if (eval.recommendations?.length > 0) {
                body += '\n**Recommendations:**\n';
                for (const rec of eval.recommendations) {
                  body += `- ${rec}\n`;
                }
              }
              if (eval.threshold) {
                body += `\n**Threshold:** ${eval.passed ? '✅ Passed' : '❌ Failed'} (${eval.overallScore} vs ${eval.threshold})\n`;
              }
            } catch {
              body += '⚠️ Eval results not available\n';
            }

            if (fs.existsSync('security-result.json')) {
              try {
                const sec = JSON.parse(fs.readFileSync('security-result.json', 'utf8'));
                body += `\n### Security\n${sec.summary.critical} critical, ${sec.summary.warning} warnings\n`;
              } catch {}
            }

            body += '\n---\n🤖 Generated by [trickle](https://github.com/yiheinchai/trickle)';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload compliance report
        if: inputs.compliance-report
        uses: actions/upload-artifact@v4
        with:
          name: trickle-compliance-report
          path: compliance-report.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: trickle-eval-results
          path: |
            eval-result.json
            security-result.json

      - name: Check eval threshold
        if: inputs.fail-under > 0
        run: |
          SCORE=$(cat eval-result.json | python3 -c "import sys,json;print(json.load(sys.stdin).get('overallScore',0))" 2>/dev/null || echo "0")
          if [ "$SCORE" -lt "${{ inputs.fail-under }}" ]; then
            echo "::error::Trickle eval score $SCORE is below threshold ${{ inputs.fail-under }}"
            exit 1
          fi
