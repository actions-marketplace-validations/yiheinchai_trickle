name: 'Trickle Agent Eval'
description: 'Zero-code agent reliability scoring. Runs your app with trickle, evaluates on 5 dimensions, posts results as PR comment.'
author: 'yiheinchai'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  command:
    description: 'Command to run with trickle (e.g., "python my_agent.py")'
    required: true
  fail-under:
    description: 'Minimum eval score (0-100). Fails if below.'
    required: false
    default: '0'
  security-scan:
    description: 'Run security scan'
    required: false
    default: 'false'
  compliance-report:
    description: 'Generate compliance audit report'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Overall eval score (0-100)'
  grade:
    description: 'Letter grade (A-F)'
  passed:
    description: 'Whether score met threshold'

runs:
  using: 'composite'
  steps:
    - name: Install trickle
      shell: bash
      run: npm install -g trickle-cli

    - name: Run with trickle
      shell: bash
      run: trickle run ${{ inputs.command }}
      continue-on-error: true

    - name: Evaluate
      id: eval
      shell: bash
      run: |
        if [ "${{ inputs.fail-under }}" != "0" ]; then
          trickle eval --fail-under ${{ inputs.fail-under }} --json > $RUNNER_TEMP/eval.json 2>/dev/null || true
        else
          trickle eval --json > $RUNNER_TEMP/eval.json 2>/dev/null || true
        fi
        if [ -f "$RUNNER_TEMP/eval.json" ]; then
          SCORE=$(python3 -c "import json;print(json.load(open('$RUNNER_TEMP/eval.json')).get('overallScore',0))" 2>/dev/null || echo "0")
          GRADE=$(python3 -c "import json;print(json.load(open('$RUNNER_TEMP/eval.json')).get('grade','?'))" 2>/dev/null || echo "?")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          THRESHOLD=${{ inputs.fail-under }}
          if [ "$THRESHOLD" != "0" ] && [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Security scan
      if: inputs.security-scan == 'true'
      shell: bash
      run: trickle security --json > $RUNNER_TEMP/security.json 2>/dev/null || true

    - name: Compliance report
      if: inputs.compliance-report == 'true'
      shell: bash
      run: trickle audit --compliance -o $RUNNER_TEMP/compliance.json 2>/dev/null || true

    - name: Check threshold
      if: inputs.fail-under != '0'
      shell: bash
      run: |
        SCORE="${{ steps.eval.outputs.score }}"
        THRESHOLD="${{ inputs.fail-under }}"
        if [ -n "$SCORE" ] && [ "$SCORE" -lt "$THRESHOLD" ] 2>/dev/null; then
          echo "::error::Trickle eval score $SCORE is below threshold $THRESHOLD"
          exit 1
        fi
