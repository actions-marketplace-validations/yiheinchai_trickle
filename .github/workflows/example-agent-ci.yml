# Example: Agent reliability CI with trickle
# Copy this to your repo's .github/workflows/
#
# On every PR, runs your agent with trickle, evaluates reliability,
# posts the score as a PR comment, and fails if below threshold.

name: Agent Reliability Check

on:
  pull_request:
    branches: [main]

jobs:
  agent-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install && npm install -g trickle-cli

      - name: Run agent with trickle
        run: trickle run node my-agent.js
        continue-on-error: true

      - name: Evaluate reliability
        run: trickle eval --fail-under 70 --json | tee eval.json

      - name: Security scan
        run: trickle security --json | tee security.json
        continue-on-error: true

      - name: Cost report
        run: trickle cost-report --json | tee cost.json
        continue-on-error: true

      - name: Compliance audit
        run: trickle audit --compliance -o compliance.json

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Agent Reliability Report\n\n';
            try {
              const e = JSON.parse(fs.readFileSync('eval.json','utf8'));
              body += `**Grade: ${e.grade} (${e.overallScore}/100)** ${e.overallScore>=70?'✅':'❌'}\n\n`;
            } catch { body += 'Eval: N/A\n'; }
            try {
              const s = JSON.parse(fs.readFileSync('security.json','utf8'));
              body += `**Security:** ${s.summary.critical} critical, ${s.summary.warning} warnings\n`;
            } catch {}
            try {
              const c = JSON.parse(fs.readFileSync('cost.json','utf8'));
              body += `**Cost:** $${c.summary.totalCost} (${c.summary.totalCalls} LLM calls)\n`;
            } catch {}
            body += '\n🤖 [trickle](https://github.com/yiheinchai/trickle)';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo, body
            });
