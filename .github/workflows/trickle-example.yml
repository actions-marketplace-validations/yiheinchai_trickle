# Example GitHub Actions workflow using trickle for observability
# Copy this to your project's .github/workflows/ directory
#
# What it does:
# 1. Runs your tests with trickle instrumentation
# 2. Detects N+1 queries, slow functions, errors, memory issues
# 3. Posts annotations directly on your PR
# 4. Fails the check if critical issues are found

name: trickle observability

on:
  pull_request:
  push:
    branches: [main]

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install trickle
      - run: npm install -g trickle-cli trickle-observe
      - run: pip install trickle-observe

      # Install your project dependencies
      - run: npm install  # or: pip install -r requirements.txt

      # Run your tests/app with trickle and analyze
      # Replace with your actual test command:
      - run: npx trickle ci "python -m pytest tests/"
        # Or for Node.js:
        # - run: npx trickle ci "npm test"

      # Optional: save baseline on main branch
      - if: github.ref == 'refs/heads/main'
        run: npx trickle verify --baseline

      # Optional: compare with baseline on PRs
      - if: github.event_name == 'pull_request'
        run: npx trickle verify

      # Optional: upload trickle data as artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trickle-data
          path: .trickle/
          retention-days: 7
